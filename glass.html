<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KOOG LAB — Liquid Glass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@700&family=Bitcount+Grid+Single&display=swap">
<style>
  :root{--red:#FF2301}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;overflow:hidden;font-family:"DM Sans",sans-serif;color:#fff}
  canvas.webgl{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .ui{position:fixed;inset:0;z-index:5;pointer-events:none}
  .ui .logo{position:absolute;top:22px;left:clamp(18px,3vw,44px);font-family:"Space Grotesk";font-weight:700;font-size:22px;letter-spacing:-.02em}
  .ui .logo b{color:var(--red)}
  .ui .tag{position:absolute;top:26px;right:clamp(18px,3vw,44px);font-family:"Bitcount Grid Single",monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.55)}
  .ui .cap{position:absolute;left:clamp(18px,3vw,44px);bottom:26px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.45)}
  .ui .cap b{color:#fff}
  .ui .hint{position:absolute;right:clamp(18px,3vw,44px);bottom:26px;font-family:"Bitcount Grid Single",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--red)}
  #loader{position:fixed;inset:0;z-index:20;background:#000;display:flex;align-items:center;justify-content:center;
    font-family:"Bitcount Grid Single",monospace;letter-spacing:.2em;color:rgba(255,255,255,.5);transition:opacity .8s}
  #loader.done{opacity:0;pointer-events:none}
</style>
</head>
<body>
<canvas class="webgl"></canvas>
<div class="ui">
  <div class="logo">KOOG<b>.</b></div>
  <div class="tag">( KOOG LAB — LIQUID GLASS )</div>
  <div class="cap"><b>Build</b> · <b>Automate</b> · <b>Grow</b> — refracted in real time</div>
  <div class="hint">MOVE THE CURSOR</div>
</div>
<div id="loader">[ WARMING UP THE GLASS ]</div>

<script>
window.addEventListener('error',function(e){window.__glassErr=((e.message||e.type)+' | '+(e.filename||'')+':'+(e.lineno||''));});
window.addEventListener('unhandledrejection',function(e){window.__glassErr='reject: '+((e.reason&&e.reason.message)||e.reason);});
</script>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';
import { FontLoader } from 'three/addons/loaders/FontLoader.js';
import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

const canvas = document.querySelector('canvas.webgl');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 6);

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
const DPR = Math.min(devicePixelRatio, 2);
renderer.setPixelRatio(DPR);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;

// ---------- #9 HDR-quality environment (procedural, no external file) ----------
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// two soft key lights to give the glass edges to catch
const key = new THREE.PointLight(0xffffff, 40, 40); key.position.set(4,5,5); scene.add(key);
const rim = new THREE.PointLight(0xff5a3c, 26, 40); rim.position.set(-5,-2,3); scene.add(rim); // warm red rim

// ============================================================
//  MELT — shared uniforms
// ============================================================
const melt = {
  uMouse:    { value: new THREE.Vector3(9999,9999,9999) },
  uTime:     { value: 0 },
  uSigma:    { value: 0.75 },   // #2 gaussian width
  uStrength: { value: 0.42 },
  uVelocity: { value: 0.0 },    // #11 mouse velocity feeds the liquid
  uFresnelColor:    { value: new THREE.Color(0xff2301) }, // #13 red rim
  uFresnelStrength: { value: 0.0 }
};

// #3 Ashima simplex noise (MIT) — standard GLSL library function
const GLSL_NOISE = `
vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x,289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
float snoise(vec3 v){
  const vec2 C = vec2(1.0/6.0, 1.0/3.0); const vec4 D = vec4(0.0,0.5,1.0,2.0);
  vec3 i = floor(v + dot(v, C.yyy)); vec3 x0 = v - i + dot(i, C.xxx);
  vec3 g = step(x0.yzx, x0.xyz); vec3 l = 1.0 - g; vec3 i1 = min(g.xyz, l.zxy); vec3 i2 = max(g.xyz, l.zxy);
  vec3 x1 = x0 - i1 + C.xxx; vec3 x2 = x0 - i2 + C.yyy; vec3 x3 = x0 - D.yyy;
  i = mod(i,289.0);
  vec4 p = permute(permute(permute(i.z + vec4(0.0,i1.z,i2.z,1.0)) + i.y + vec4(0.0,i1.y,i2.y,1.0)) + i.x + vec4(0.0,i1.x,i2.x,1.0));
  float n_=0.142857142857; vec3 ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0*floor(p*ns.z*ns.z);
  vec4 x_ = floor(j*ns.z); vec4 y_ = floor(j - 7.0*x_);
  vec4 x = x_ *ns.x + ns.yyyy; vec4 y = y_ *ns.x + ns.yyyy; vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4(x.xy, y.xy); vec4 b1 = vec4(x.zw, y.zw);
  vec4 s0 = floor(b0)*2.0+1.0; vec4 s1 = floor(b1)*2.0+1.0; vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy; vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
  vec3 p0 = vec3(a0.xy,h.x); vec3 p1 = vec3(a0.zw,h.y); vec3 p2 = vec3(a1.xy,h.z); vec3 p3 = vec3(a1.zw,h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)), 0.0); m=m*m;
  return 42.0 * dot(m*m, vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}`;

// #2 gaussian falloff · #3 ripple field · #12 breathing — the displacement field
const GLSL_FIELD = `
uniform vec3 uMouse; uniform float uTime; uniform float uSigma; uniform float uStrength; uniform float uVelocity;
float infl(vec3 wp){ float d=distance(wp, uMouse); return exp(-(d*d)/(2.0*uSigma*uSigma)); }
float ripple(vec3 wp){ return snoise(wp*2.4 + vec3(0.0,0.0,uTime*1.2)); }
float field(vec3 wp){
  float I = infl(wp);
  float rp = ripple(wp) * I * (0.16 + uVelocity*0.5);          // #3/#11 velocity-scaled ripples
  float breath = sin(uTime*1.1) * 0.5 + 0.5;                    // #12 idle breathing
  return I * uStrength * 0.45 + rp + (breath*0.008);
}`;

// apply melt (vertex displace + #4 normal recompute) to any physical/standard material
function applyMelt(mat, fresnel){
  mat.onBeforeCompile = (sh) => {
    sh.uniforms.uMouse=melt.uMouse; sh.uniforms.uTime=melt.uTime; sh.uniforms.uSigma=melt.uSigma;
    sh.uniforms.uStrength=melt.uStrength; sh.uniforms.uVelocity=melt.uVelocity;
    sh.uniforms.uFresnelColor=melt.uFresnelColor; sh.uniforms.uFresnelStrength=melt.uFresnelStrength;

    sh.vertexShader = sh.vertexShader.replace('#include <common>', `#include <common>\n${GLSL_NOISE}\n${GLSL_FIELD}`);
    // #4 recompute normal from the displacement gradient so reflections bend with the surface
    sh.vertexShader = sh.vertexShader.replace('#include <beginnormal_vertex>', `#include <beginnormal_vertex>
      { vec3 wp=(modelMatrix*vec4(position,1.0)).xyz; float e=0.06;
        vec3 grad=vec3(field(wp+vec3(e,0,0))-field(wp-vec3(e,0,0)),
                       field(wp+vec3(0,e,0))-field(wp-vec3(0,e,0)),
                       field(wp+vec3(0,0,e))-field(wp-vec3(0,0,e)))/(2.0*e);
        objectNormal = normalize(objectNormal - grad*1.6); }`);
    // displace along normal + drip
    sh.vertexShader = sh.vertexShader.replace('#include <begin_vertex>', `#include <begin_vertex>
      { vec3 wp=(modelMatrix*vec4(position,1.0)).xyz; float h=field(wp);
        transformed += normalize(objectNormal)*h;
        transformed.y -= infl(wp)*uStrength*0.55; }`);

    if (fresnel){ // #13 fresnel rim glow (bloom picks it up)
      sh.fragmentShader = sh.fragmentShader.replace('#include <common>',
        `#include <common>\nuniform vec3 uFresnelColor; uniform float uFresnelStrength;`);
      sh.fragmentShader = sh.fragmentShader.replace('#include <emissivemap_fragment>', `#include <emissivemap_fragment>
        { float f = pow(1.0 - clamp(dot(normalize(vNormal), normalize(vViewPosition)),0.0,1.0), 3.0);
          totalEmissiveRadiance += uFresnelColor * f * (0.6 + uFresnelStrength); }`);
    }
    mat.userData.shader = sh;
  };
  mat.needsUpdate = true;
}

// ============================================================
//  #5 high-end glass cube · #15 tuned geometry
// ============================================================
const glass = new THREE.MeshPhysicalMaterial({
  transmission: 1, thickness: 1.1, roughness: 0.06, metalness: 0,
  ior: 1.45, envMapIntensity: 1.1,
  iridescence: 0.45, iridescenceIOR: 1.3, iridescenceThicknessRange: [120, 760],
  clearcoat: 1, clearcoatRoughness: 0.08, attenuationColor: new THREE.Color(0xffe9e4), attenuationDistance: 3.2
});
applyMelt(glass, true);
const cube = new THREE.Mesh(new RoundedBoxGeometry(1.8,1.8,1.8, 12, 0.28), glass);
scene.add(cube);

// ============================================================
//  #14 text refracted behind the glass
// ============================================================
const textGroup = new THREE.Group(); scene.add(textGroup);
const loaderEl = document.getElementById('loader');
new FontLoader().load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json', (font)=>{
  const words = ['BUILD','AUTOMATE','GROW'];
  const mat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.35, metalness:0.1, envMapIntensity:0.7,
    emissive:0x110402, emissiveIntensity:1 });
  applyMelt(mat, false);
  const lh = 1.15;
  words.forEach((w,i)=>{
    const g = new TextGeometry(w, { font, size:0.62, height:0.02, curveSegments:8, bevelEnabled:false });
    g.center();
    const m = new THREE.Mesh(g, i===1 ? mat.clone() : mat);
    if(i===1){ m.material.color.set(0xff2301); m.material.emissive.set(0x2a0500); } // AUTOMATE in red
    m.position.set(0, (1-i)*lh, -0.9); // behind the cube -> refracted through it
    textGroup.add(m);
  });
  loaderEl.classList.add('done');
});
setTimeout(()=>loaderEl.classList.add('done'), 4000); // fail-safe

// ============================================================
//  POST — #6 bloom · #7 chromatic + #10 caustic · #8 FXAA
// ============================================================
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.55, 0.5, 0.85);
composer.addPass(bloom);

// #7 chromatic aberration + #10 animated caustic wobble, in one pass
const ChromaCaustic = {
  uniforms:{ tDiffuse:{value:null}, uTime:{value:0}, uAmount:{value:0.0}, uCenter:{value:new THREE.Vector2(0.5,0.5)} },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
  fragmentShader:`
    uniform sampler2D tDiffuse; uniform float uTime; uniform float uAmount; uniform vec2 uCenter; varying vec2 vUv;
    void main(){
      vec2 dir = vUv - uCenter; float d = length(dir);
      vec2 caustic = vec2(sin(vUv.y*34.0 + uTime*1.6), cos(vUv.x*34.0 - uTime*1.4)) * 0.0016; // #10
      float a = (0.0025 + uAmount*0.02) * (0.35 + d*1.5);                                     // #7 radial
      vec2 off = normalize(dir + 0.0001) * a + caustic;
      float r = texture2D(tDiffuse, vUv + off).r;
      float g = texture2D(tDiffuse, vUv).g;
      float b = texture2D(tDiffuse, vUv - off).b;
      gl_FragColor = vec4(r,g,b, 1.0);
    }`
};
const chroma = new ShaderPass(ChromaCaustic); composer.addPass(chroma);

const fxaa = new ShaderPass(FXAAShader); composer.addPass(fxaa); // #8
function setFxaa(){ fxaa.material.uniforms['resolution'].value.set(1/(innerWidth*DPR), 1/(innerHeight*DPR)); }
setFxaa();

// ============================================================
//  #1 spring soft-body mouse · #11 velocity
// ============================================================
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2(9999,9999);
const target = new THREE.Vector3(9999,9999,9999);
const springPos = new THREE.Vector3(9999,9999,9999);
const springVel = new THREE.Vector3();
const plane = new THREE.Plane(new THREE.Vector3(0,0,1), 0);
let lastTarget = new THREE.Vector3(); let mouseSpeed = 0;
let active = false;

addEventListener('pointermove', (e)=>{
  ndc.x = (e.clientX/innerWidth)*2 - 1;
  ndc.y = -(e.clientY/innerHeight)*2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const hit = raycaster.intersectObject(cube, false);
  const p = new THREE.Vector3();
  if(hit.length){ p.copy(hit[0].point); } else { raycaster.ray.intersectPlane(plane, p); }
  if(p){ if(active) mouseSpeed = p.distanceTo(lastTarget); lastTarget.copy(p); target.copy(p); active = true; }
});
addEventListener('pointerleave', ()=>{ target.set(9999,9999,9999); active=false; });

// ============================================================
//  LOOP
// ============================================================
const clock = new THREE.Clock();
function tick(){
  const dt = Math.min(clock.getDelta(), 0.033);
  const t = clock.elapsedTime;
  melt.uTime.value = t; chroma.uniforms.uTime.value = t;

  // #1 spring physics (stiffness/damping) instead of lerp
  if(target.x < 9000){
    const k=110, damp=15;
    const acc = target.clone().sub(springPos).multiplyScalar(k).addScaledVector(springVel, -damp);
    springVel.addScaledVector(acc, dt);
    springPos.addScaledVector(springVel, dt);
  } else { springVel.multiplyScalar(0.9); }
  melt.uMouse.value.copy(springPos);

  // #11 velocity → liquid intensity, chromatic amount, fresnel flare
  mouseSpeed *= 0.85;
  const vel = Math.min(mouseSpeed*6.0, 1.0);
  melt.uVelocity.value += (vel - melt.uVelocity.value)*0.2;
  chroma.uniforms.uAmount.value += (vel - chroma.uniforms.uAmount.value)*0.15;
  melt.uFresnelStrength.value += (vel*1.2 - melt.uFresnelStrength.value)*0.1;

  // idle auto-rotate (breathing scale handled in shader)
  cube.rotation.y = t*0.22; cube.rotation.x = Math.sin(t*0.3)*0.18;
  const breathe = 1 + Math.sin(t*1.1)*0.012;
  cube.scale.setScalar(breathe);
  textGroup.rotation.y = Math.sin(t*0.2)*0.06;

  composer.render();
  requestAnimationFrame(tick);
}
tick();

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
  bloom.setSize(innerWidth, innerHeight); setFxaa();
});
window.__glassOK = true;
window.__glassForceRender = ()=>{ try{composer.render();}catch(e){window.__glassErr='render:'+e.message;} };
</script>
</body>
</html>
